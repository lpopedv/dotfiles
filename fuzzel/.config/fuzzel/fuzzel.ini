[main]
font=JetBrainsMono Nerd Font:size=17
icon-theme=hicolor
icons-enabled=yes
terminal=ghostty -e
lines=14
width=52
horizontal-pad=20
vertical-pad=16
inner-pad=10
image-size-ratio=0.5
prompt=

[colors]
background=0e0e0eee
text=c8c8c8ff
match=33ccffff
selection=33ccff22
selection-text=ffffffff
selection-match=00ff99ff
border=33ccff66

[border]
width=1
radius=12

[dmenu]
exit-immediately-if-empty=yes
