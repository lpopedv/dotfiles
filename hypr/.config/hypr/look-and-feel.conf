# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 14

    border_size = 3

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ff8800ee) rgba(cc44ffee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.93

    shadow {
        enabled = true
        range = 14
        render_power = 4
        color = rgba(050505ee)
        color_inactive = rgba(00000066)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        vibrancy = 0.22
        vibrancy_darkness = 0.5
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    #        NAME,          X0,    Y0,   X1,    Y1
    bezier = overshoot,     0.05,  0.9,  0.1,   1.12  # bounce com caráter
    bezier = fluent,        0.25,  1,    0.5,   1     # suave, sem bounce (moves)
    bezier = easeOutExpo,   0.16,  1,    0.3,   1
    bezier = easeInExpo,    0.7,   0,    0.84,  0
    bezier = easeOutQuint,  0.23,  1,    0.32,  1
    bezier = linear,        0,     0,    1,     1

    # Windows — slide vertical sutil com fade, sem bounce
    animation = windows,       1, 4,    easeOutExpo
    animation = windowsIn,     1, 4,    easeOutExpo,  slidefadevert 10%
    animation = windowsOut,    1, 5,    easeOutExpo,  popin 65%
    animation = windowsMove,   1, 3,    fluent

    # Fades — rápidos, em segundo plano
    animation = fadeIn,        1, 2.5,  easeOutExpo
    animation = fadeOut,       1, 5,    easeOutExpo
    animation = fade,          1, 2.5,  easeOutExpo

    # Layers (wlogout, rofi, notifications) — popin 85% mais sutil que janelas
    animation = layers,        1, 3,    overshoot
    animation = layersIn,      1, 3,    overshoot,    popin 85%
    animation = layersOut,     1, 1.8,  easeOutExpo,  popin 85%
    animation = fadeLayersIn,  1, 2.5,  easeOutExpo
    animation = fadeLayersOut, 1, 2,    easeOutExpo

    # Workspaces — slidefade 15%: menos deslocamento, mais fade
    animation = workspaces,    1, 3.5,  overshoot,    slidefade 15%
    animation = workspacesIn,  1, 3.5,  overshoot,    slidefade 15%
    animation = workspacesOut, 1, 2.5,  easeOutExpo,  slidefade 15%

    # Border gradient girando continuamente
    animation = border,        1, 5.39, easeOutQuint
    animation = borderangle,   1, 30,   linear,       loop

    animation = zoomFactor,    1, 3,    overshoot
}

